# Customer Feedback Intelligence Platform - Master Config
# All hyperparameters and settings. No hardcoded values in source code.

project:
  name: "customer-feedback-intelligence"
  version: "1.0.0"
  random_seed: 42

data:
  dataset_name: "McAuley-Lab/Amazon-Reviews-2023"
  categories:
    - "Electronics"
    - "Clothing_Shoes_and_Jewelry"
    - "Home_and_Kitchen"
    - "Sports_and_Outdoors"
    - "Books"
  target_reviews: 50000
  reviews_per_category: 10000
  max_text_length: 512       # tokens
  min_text_length: 10        # characters
  train_split: 0.80
  val_split: 0.10
  test_split: 0.10
  processed_dir: "data/processed"
  raw_dir: "data/raw"
  evaluation_dir: "data/evaluation"

sentiment:
  labels:
    positive: [4, 5]         # star ratings → sentiment class
    neutral: [3]
    negative: [1, 2]
  label_map:
    negative: 0
    neutral: 1
    positive: 2
  num_classes: 3

models:
  sentiment:
    base_model: "distilbert-base-uncased"
    save_dir: "models/sentiment"
    batch_size: 16
    epochs: 5
    learning_rate: 2.0e-5
    warmup_steps: 100
    weight_decay: 0.01
    max_grad_norm: 1.0
    early_stopping_patience: 3
    lora:
      r: 8
      lora_alpha: 16
      lora_dropout: 0.1
      target_modules: ["q_lin", "v_lin"]

  aspect:
    base_model: "distilbert-base-uncased"
    save_dir: "models/aspect"
    batch_size: 8
    epochs: 5
    learning_rate: 1.0e-5
    warmup_steps: 100
    weight_decay: 0.01
    max_grad_norm: 1.0
    early_stopping_patience: 3
    aspects:
      - "price"
      - "quality"
      - "delivery"
      - "customer_service"
      - "packaging"
      - "usability"
    lora:
      r: 8
      lora_alpha: 16
      lora_dropout: 0.1
      target_modules: ["q_lin", "v_lin"]

  topic:
    embedding_model: "all-MiniLM-L6-v2"
    num_topics: 20
    min_topic_size: 10
    save_dir: "models/embeddings"

retrieval:
  embedding_model: "all-MiniLM-L6-v2"
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 50                  # initial retrieval
  rerank_top_k: 10           # after reranking
  faiss_index_path: "models/embeddings/faiss.index"
  chroma_persist_dir: "models/embeddings/chroma"
  chroma_collection: "reviews"
  batch_size: 128

llm:
  provider: "groq"
  model: "llama3-8b-8192"
  max_tokens: 1024
  temperature: 0.3
  retry_attempts: 3
  retry_delay: 2.0           # seconds
  rate_limit_rpm: 30

evaluation:
  gold_standard_size: 50
  llm_eval_samples: 20
  latency_runs: 100
  results_path: "data/evaluation/results.json"

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  log_dir: "logs"

dashboard:
  port: 8501
  title: "Customer Feedback Intelligence"
  max_search_results: 20
